<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f4f6f9" rx="10"/>
  <text x="410" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Single Cluster vs. Multi-Cluster</text>

  <!-- Single Cluster (left) -->
  <rect x="20" y="48" width="360" height="240" rx="10" fill="#fdecea" stroke="#e74c3c" stroke-width="2"/>
  <rect x="20" y="48" width="360" height="36" rx="10" fill="#e74c3c"/>
  <rect x="20" y="70" width="360" height="14" fill="#e74c3c"/>
  <text x="200" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Single Cluster</text>

  <rect x="60" y="100" width="280" height="100" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="200" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Alles in einem Cluster</text>
  <text x="200" y="142" text-anchor="middle" font-size="10" fill="#555">Prod + Dev + Staging</text>
  <text x="200" y="158" text-anchor="middle" font-size="10" fill="#555">EU + US + alle Teams</text>
  <text x="200" y="174" text-anchor="middle" font-size="10" fill="#555">Alle Workloads gemischt</text>
  <text x="200" y="190" text-anchor="middle" font-size="10" fill="#555">Alle Daten zusammen</text>

  <rect x="40" y="218" width="320" height="52" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="200" y="238" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">Ein Ausfall trifft alles</text>
  <text x="200" y="254" text-anchor="middle" font-size="10" fill="#c0392b">Keine Compliance-Trennung moeglich</text>
  <text x="200" y="270" text-anchor="middle" font-size="10" fill="#c0392b">Keine Geo-Verteilung moeglich (&lt; 10 ms)</text>

  <!-- Multi-Cluster (right) -->
  <rect x="440" y="48" width="360" height="240" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="440" y="48" width="360" height="36" rx="10" fill="#27ae60"/>
  <rect x="440" y="70" width="360" height="14" fill="#27ae60"/>
  <text x="620" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Multi-Cluster</text>

  <rect x="460" y="100" width="148" height="56" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="534" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5276">Prod EU</text>
  <text x="534" y="140" text-anchor="middle" font-size="9" fill="#555">DSGVO-konform</text>
  <text x="534" y="153" text-anchor="middle" font-size="9" fill="#555">Frankfurt</text>

  <rect x="632" y="100" width="148" height="56" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="706" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5276">Prod US</text>
  <text x="706" y="140" text-anchor="middle" font-size="9" fill="#555">CCPA-konform</text>
  <text x="706" y="153" text-anchor="middle" font-size="9" fill="#555">Virginia</text>

  <rect x="460" y="166" width="148" height="46" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="534" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">Staging</text>
  <text x="534" y="202" text-anchor="middle" font-size="9" fill="#888">Integrationstests</text>

  <rect x="632" y="166" width="148" height="46" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="706" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">Dev</text>
  <text x="706" y="202" text-anchor="middle" font-size="9" fill="#888">Entwickler-Sandbox</text>

  <rect x="460" y="228" width="320" height="42" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="620" y="247" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e8449">Isolation, Geo-Verteilung, Compliance</text>
  <text x="620" y="262" text-anchor="middle" font-size="10" fill="#1e8449">Ausfall eines Clusters trifft nur eine Region</text>

  <!-- Bottom note -->
  <rect x="20" y="298" width="780" height="16" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="410" y="310" text-anchor="middle" font-size="9" fill="#7d6608">Mehr Cluster = mehr Sicherheit und Compliance, aber auch mehr Betriebsaufwand — bewusst abwaegen!</text>
</svg>
