<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img">
<title>IAM und Kundenverwaltung als getrennte Bounded Contexts</title>
<desc>Zwei Bounded Contexts mit eigenen Events, verbunden über ein Integration Event. Notification und Analytics konsumieren das gleiche Event.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
.t-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; }
</style>
</defs>

<!-- IAM Bounded Context -->
<rect x="30" y="40" width="290" height="220" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-title" x="50" y="68" fill="#0C447C">IAM (Generic BC)</text>
<text class="t-sub" x="50" y="86" fill="#185FA5">Identität, Login, Rollen</text>

<!-- IAM Aggregate: User -->
<rect x="50" y="108" width="120" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="t-title" x="110" y="132" text-anchor="middle" dominant-baseline="central" fill="#0C447C">User</text>
<text class="t-sub" x="110" y="150" text-anchor="middle" dominant-baseline="central" fill="#185FA5">userId, email, roles</text>

<!-- IAM Events -->
<rect x="186" y="108" width="118" height="24" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="t-sub" x="245" y="120" text-anchor="middle" dominant-baseline="central" fill="#854F0B">UserRegistered</text>

<rect x="186" y="140" width="118" height="24" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="t-sub" x="245" y="152" text-anchor="middle" dominant-baseline="central" fill="#854F0B">RoleAssigned</text>

<rect x="186" y="172" width="118" height="24" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="t-sub" x="245" y="184" text-anchor="middle" dominant-baseline="central" fill="#854F0B">PasswordChanged</text>

<text class="t-sub" x="50" y="220" fill="#185FA5">Domain Events (intern)</text>
<text class="t-sub" x="50" y="240" fill="#185FA5">— bleiben im Context</text>

<!-- Kundenverwaltung Bounded Context -->
<rect x="360" y="40" width="290" height="220" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-title" x="380" y="68" fill="#085041">Kundenverwaltung (Domain BC)</text>
<text class="t-sub" x="380" y="86" fill="#0F6E56">Geschäftsobjekt Kunde</text>

<!-- Customer Aggregate -->
<rect x="380" y="108" width="120" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-title" x="440" y="132" text-anchor="middle" dominant-baseline="central" fill="#085041">Customer</text>
<text class="t-sub" x="440" y="150" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">customerId → userId</text>

<!-- Kunden Events -->
<rect x="516" y="108" width="118" height="24" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="t-sub" x="575" y="120" text-anchor="middle" dominant-baseline="central" fill="#854F0B">CustomerRegistered</text>

<rect x="516" y="140" width="118" height="24" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="t-sub" x="575" y="152" text-anchor="middle" dominant-baseline="central" fill="#854F0B">AddressChanged</text>

<rect x="516" y="172" width="118" height="24" rx="4" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="t-sub" x="575" y="184" text-anchor="middle" dominant-baseline="central" fill="#854F0B">CustomerBlocked</text>

<text class="t-sub" x="380" y="220" fill="#0F6E56">Domain Events (intern)</text>
<text class="t-sub" x="380" y="240" fill="#0F6E56">— bleiben im Context</text>

<!-- Integration Event Bus -->
<rect x="80" y="300" width="520" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t-title" x="340" y="320" text-anchor="middle" dominant-baseline="central" fill="#712B13">Integration Event: UserRegistered</text>
<text class="t-sub" x="340" y="336" text-anchor="middle" dominant-baseline="central" fill="#993C1D">schlank · stabil · Owner = IAM</text>

<!-- IAM publishes -->
<line x1="175" y1="260" x2="175" y2="300" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<text class="t-sub" x="182" y="285" dominant-baseline="central" fill="#185FA5">publishes</text>

<!-- Consumers Row -->
<rect x="60" y="400" width="160" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t-title" x="140" y="420" text-anchor="middle" dominant-baseline="central" fill="#085041">Kundenverwaltung</text>
<text class="t-sub" x="140" y="438" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">legt Customer an</text>

<rect x="260" y="400" width="160" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="t-title" x="340" y="420" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Notification</text>
<text class="t-sub" x="340" y="438" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Welcome-Mail</text>

<rect x="460" y="400" width="160" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="t-title" x="540" y="420" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Analytics</text>
<text class="t-sub" x="540" y="438" text-anchor="middle" dominant-baseline="central" fill="#534AB7">zählt Signups</text>

<!-- Bus to consumers -->
<line x1="140" y1="346" x2="140" y2="400" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="346" x2="340" y2="400" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="540" y1="346" x2="540" y2="400" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

<text class="t-sub" x="340" y="490" text-anchor="middle" fill="#5F5E5A">Ein Event publiziert · mehrere Konsumenten · klarer Owner</text>
</svg>
