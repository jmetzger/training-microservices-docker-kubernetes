<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="sans-serif">
  <rect width="820" height="340" fill="#0f172a" rx="12"/>
  <text x="410" y="36" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">Client Credentials Flow – Service-to-Service</text>

  <!-- Service A -->
  <rect x="30" y="70" width="150" height="60" rx="8" fill="#1e3a5f"/>
  <text x="105" y="95" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">Service A</text>
  <text x="105" y="113" text-anchor="middle" fill="#bfdbfe" font-size="11">(kein User beteiligt)</text>

  <!-- Keycloak -->
  <rect x="330" y="70" width="150" height="60" rx="8" fill="#14532d"/>
  <text x="405" y="95" text-anchor="middle" fill="#86efac" font-size="13" font-weight="bold">Keycloak</text>
  <text x="405" y="113" text-anchor="middle" fill="#a3e6bb" font-size="11">/protocol/openid-connect/token</text>

  <!-- Service B / API -->
  <rect x="630" y="70" width="150" height="60" rx="8" fill="#7c2d12"/>
  <text x="705" y="95" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">Service B</text>
  <text x="705" y="113" text-anchor="middle" fill="#fecaca" font-size="11">(Resource Server)</text>

  <!-- Vertikale Linien -->
  <line x1="105" y1="130" x2="105" y2="310" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="405" y1="130" x2="405" y2="310" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="705" y1="130" x2="705" y2="310" stroke="#9a3412" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Schritt 1: Service A fragt Token an -->
  <text x="18" y="175" fill="#64748b" font-size="11" font-weight="bold">1</text>
  <line x1="105" y1="165" x2="395" y2="165" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="391,161 401,165 391,169" fill="#60a5fa"/>
  <rect x="130" y="148" width="250" height="22" rx="4" fill="#0f172a"/>
  <text x="255" y="163" text-anchor="middle" fill="#93c5fd" font-size="10">POST /token  grant_type=client_credentials</text>
  <text x="255" y="183" text-anchor="middle" fill="#475569" font-size="10">client_id=service-a  client_secret=***</text>

  <!-- Schritt 2: Keycloak gibt JWT -->
  <text x="18" y="225" fill="#64748b" font-size="11" font-weight="bold">2</text>
  <line x1="395" y1="210" x2="115" y2="210" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="119,206 109,210 119,214" fill="#4ade80"/>
  <rect x="160" y="196" width="220" height="22" rx="4" fill="#0f172a"/>
  <text x="270" y="211" text-anchor="middle" fill="#4ade80" font-size="10">{ "access_token": "eyJhbGc...", "expires_in": 300 }</text>

  <!-- Schritt 3: Service A ruft Service B mit JWT -->
  <text x="18" y="265" fill="#64748b" font-size="11" font-weight="bold">3</text>
  <line x1="105" y1="252" x2="695" y2="252" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="691,248 701,252 691,256" fill="#60a5fa"/>
  <text x="400" y="247" text-anchor="middle" fill="#93c5fd" font-size="11">GET /api/orders    Authorization: Bearer eyJhbGc...</text>

  <!-- Schritt 4: Service B antwortet -->
  <text x="18" y="300" fill="#64748b" font-size="11" font-weight="bold">4</text>
  <line x1="695" y1="280" x2="115" y2="280" stroke="#fca5a5" stroke-width="1.5"/>
  <polygon points="119,276 109,280 119,284" fill="#fca5a5"/>
  <text x="400" y="275" text-anchor="middle" fill="#fca5a5" font-size="11">200 OK + Daten</text>

  <!-- Hinweis: Token cachen -->
  <rect x="30" y="300" width="340" height="28" rx="4" fill="#1e293b"/>
  <text x="200" y="314" text-anchor="middle" fill="#f59e0b" font-size="10">Tipp: Token bis kurz vor Ablauf cachen</text>
  <text x="200" y="325" text-anchor="middle" fill="#78716c" font-size="9">(nicht bei jedem API-Call neu holen)</text>

  <!-- expires_in -->
  <rect x="450" y="300" width="340" height="28" rx="4" fill="#1e293b"/>
  <text x="620" y="314" text-anchor="middle" fill="#64748b" font-size="10">expires_in: 300 sek · Refresh nur via neuem Token-Request</text>
  <text x="620" y="325" text-anchor="middle" fill="#475569" font-size="9">kein Refresh Token im Client Credentials Flow</text>
</svg>
