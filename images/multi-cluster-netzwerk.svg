<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Arial, sans-serif">
  <rect width="820" height="360" fill="#f4f6f9" rx="10"/>
  <text x="410" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Verbindung zwischen Clustern: Drei Optionen</text>

  <!-- Option 1: VPN -->
  <rect x="15" y="48" width="250" height="285" rx="10" fill="#eaf4fb" stroke="#2980b9" stroke-width="2"/>
  <rect x="15" y="48" width="250" height="34" rx="10" fill="#2980b9"/>
  <rect x="15" y="68" width="250" height="14" fill="#2980b9"/>
  <text x="140" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Option 1: VPN</text>

  <rect x="30" y="94" width="100" height="50" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1.5"/>
  <text x="80" y="114" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Cluster A</text>
  <text x="80" y="130" text-anchor="middle" font-size="9" fill="#555">10.0.0.0/16</text>

  <rect x="150" y="94" width="100" height="50" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1.5"/>
  <text x="200" y="114" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Cluster B</text>
  <text x="200" y="130" text-anchor="middle" font-size="9" fill="#555">10.1.0.0/16</text>

  <line x1="132" y1="119" x2="148" y2="119" stroke="#2980b9" stroke-width="2" marker-end="url(#arrBlue)" marker-start="url(#arrBlueRev)"/>
  <text x="140" y="112" text-anchor="middle" font-size="8" fill="#2980b9">VPN</text>

  <rect x="30" y="162" width="220" height="80" rx="6" fill="#d6eaf8" stroke="#aed6f1" stroke-width="1"/>
  <text x="140" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5276">Einfach einzurichten</text>
  <text x="140" y="196" text-anchor="middle" font-size="9" fill="#555">Gut fuer: wenige Dienste</text>
  <text x="140" y="210" text-anchor="middle" font-size="9" fill="#555">On-Prem zu Cloud</text>
  <text x="140" y="226" text-anchor="middle" font-size="9" fill="#c0392b">Kein auto. Service Discovery</text>

  <rect x="30" y="256" width="220" height="62" rx="6" fill="#fdecea" stroke="#f1948a" stroke-width="1"/>
  <text x="140" y="274" text-anchor="middle" font-size="9" font-weight="bold" fill="#c0392b">Einschraenkungen</text>
  <text x="140" y="290" text-anchor="middle" font-size="9" fill="#c0392b">Manuelles Routing noetig</text>
  <text x="140" y="306" text-anchor="middle" font-size="9" fill="#c0392b">Kein gemeinsamer Service Mesh</text>

  <!-- Option 2: Service Mesh -->
  <rect x="285" y="48" width="250" height="285" rx="10" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
  <rect x="285" y="48" width="250" height="34" rx="10" fill="#e67e22"/>
  <rect x="285" y="68" width="250" height="14" fill="#e67e22"/>
  <text x="410" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Option 2: Service Mesh (Istio)</text>

  <rect x="300" y="94" width="100" height="50" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="350" y="111" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Cluster A</text>
  <text x="350" y="125" text-anchor="middle" font-size="9" fill="#555">Istiod</text>
  <text x="350" y="138" text-anchor="middle" font-size="9" fill="#555">Gateway</text>

  <rect x="420" y="94" width="100" height="50" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="470" y="111" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Cluster B</text>
  <text x="470" y="125" text-anchor="middle" font-size="9" fill="#555">Istiod</text>
  <text x="470" y="138" text-anchor="middle" font-size="9" fill="#555">Gateway</text>

  <line x1="402" y1="119" x2="418" y2="119" stroke="#e67e22" stroke-width="2" marker-end="url(#arrOrange)" marker-start="url(#arrOrangeRev)"/>
  <text x="410" y="112" text-anchor="middle" font-size="8" fill="#e67e22">mTLS</text>

  <rect x="300" y="162" width="220" height="80" rx="6" fill="#fdebd0" stroke="#f0b27a" stroke-width="1"/>
  <text x="410" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#784212">Service Discovery uebergreifend</text>
  <text x="410" y="196" text-anchor="middle" font-size="9" fill="#555">Pods sehen remote Services</text>
  <text x="410" y="210" text-anchor="middle" font-size="9" fill="#555">wie lokale Services</text>
  <text x="410" y="226" text-anchor="middle" font-size="9" fill="#555">mTLS automatisch</text>

  <rect x="300" y="256" width="220" height="62" rx="6" fill="#fdecea" stroke="#f1948a" stroke-width="1"/>
  <text x="410" y="274" text-anchor="middle" font-size="9" font-weight="bold" fill="#c0392b">Einschraenkungen</text>
  <text x="410" y="290" text-anchor="middle" font-size="9" fill="#c0392b">Komplex, Istio-Expertise noetig</text>
  <text x="410" y="306" text-anchor="middle" font-size="9" fill="#c0392b">Sidecar-Overhead pro Pod</text>

  <!-- Option 3: Cilium -->
  <rect x="555" y="48" width="250" height="285" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="555" y="48" width="250" height="34" rx="10" fill="#27ae60"/>
  <rect x="555" y="68" width="250" height="14" fill="#27ae60"/>
  <text x="680" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Option 3: Cilium ClusterMesh</text>

  <rect x="570" y="94" width="100" height="50" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="620" y="111" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">cluster-1</text>
  <text x="620" y="125" text-anchor="middle" font-size="9" fill="#555">Cilium Agent</text>
  <text x="620" y="138" text-anchor="middle" font-size="9" fill="#555">Pod A</text>

  <rect x="690" y="94" width="100" height="50" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="740" y="111" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">cluster-2</text>
  <text x="740" y="125" text-anchor="middle" font-size="9" fill="#555">Cilium Agent</text>
  <text x="740" y="138" text-anchor="middle" font-size="9" fill="#555">Pod B</text>

  <line x1="672" y1="119" x2="688" y2="119" stroke="#27ae60" stroke-width="2" marker-end="url(#arrGreen)" marker-start="url(#arrGreenRev)"/>
  <text x="680" y="112" text-anchor="middle" font-size="8" fill="#27ae60">direkt</text>

  <rect x="570" y="162" width="220" height="80" rx="6" fill="#d5f5e3" stroke="#a9dfbf" stroke-width="1"/>
  <text x="680" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e8449">Pod-to-Pod ohne Sidecar</text>
  <text x="680" y="196" text-anchor="middle" font-size="9" fill="#555">Kein Proxy-Overhead</text>
  <text x="680" y="210" text-anchor="middle" font-size="9" fill="#555">Native NetworkPolicy</text>
  <text x="680" y="226" text-anchor="middle" font-size="9" fill="#555">Performance-kritisch geeignet</text>

  <rect x="570" y="256" width="220" height="62" rx="6" fill="#fef9e7" stroke="#f9e79f" stroke-width="1"/>
  <text x="680" y="274" text-anchor="middle" font-size="9" font-weight="bold" fill="#7d6608">Voraussetzung</text>
  <text x="680" y="290" text-anchor="middle" font-size="9" fill="#7d6608">Cilium muss in allen Clustern</text>
  <text x="680" y="306" text-anchor="middle" font-size="9" fill="#7d6608">als CNI installiert sein</text>

  <defs>
    <marker id="arrBlue" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrBlueRev" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L7,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrOrange" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrOrangeRev" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L7,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrGreenRev" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L7,3 z" fill="#27ae60"/>
    </marker>
  </defs>
</svg>
