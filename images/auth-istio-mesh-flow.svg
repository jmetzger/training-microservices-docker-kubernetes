<svg viewBox="0 0 740 400" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#27ae60"/>
    </marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#8E44AD"/>
    </marker>
  </defs>

  <!-- Cluster -->
  <rect x="5" y="10" width="730" height="380" rx="10" fill="#f0f4f8" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="370" y="27" text-anchor="middle" fill="#4A90D9" font-weight="bold">Kubernetes Cluster – Istio Service Mesh</text>

  <!-- Istiod -->
  <rect x="270" y="40" width="200" height="50" rx="8" fill="#264653" stroke="#1a2f38" stroke-width="2"/>
  <text x="370" y="62" text-anchor="middle" fill="white" font-weight="bold">Istiod (Control Plane)</text>
  <text x="370" y="78" text-anchor="middle" fill="#aad4e5" font-size="10">verteilt SVID-Zertifikate an alle Envoy Sidecars</text>

  <!-- Keycloak -->
  <rect x="570" y="40" width="145" height="50" rx="6" fill="#8E44AD" stroke="#5B2B72" stroke-width="2"/>
  <text x="642" y="62" text-anchor="middle" fill="white" font-weight="bold">Keycloak</text>
  <text x="642" y="78" text-anchor="middle" fill="#ddd" font-size="10">JWKS Public Keys</text>

  <!-- External Client -->
  <rect x="20" y="160" width="100" height="50" rx="6" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <text x="70" y="182" text-anchor="middle" fill="white" font-weight="bold">Kunde /</text>
  <text x="70" y="197" text-anchor="middle" fill="white" font-weight="bold">Mobile App</text>

  <!-- Istio Ingress Gateway -->
  <rect x="145" y="145" width="140" height="80" rx="8" fill="#E67E22" stroke="#9A5A0A" stroke-width="2"/>
  <text x="215" y="168" text-anchor="middle" fill="white" font-weight="bold">Istio Ingress</text>
  <text x="215" y="183" text-anchor="middle" fill="white" font-weight="bold">Gateway</text>
  <text x="215" y="200" text-anchor="middle" fill="#ffe" font-size="10">RequestAuthentication</text>
  <text x="215" y="214" text-anchor="middle" fill="#ffe" font-size="10">JWT pruefen + Claims → Header</text>

  <!-- Pod A -->
  <rect x="340" y="130" width="155" height="110" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  <text x="417" y="152" text-anchor="middle" fill="#333" font-weight="bold">Pod: Order Service</text>
  <text x="417" y="167" text-anchor="middle" fill="#888" font-size="10">SA: order-service</text>
  <rect x="355" y="173" width="125" height="28" rx="4" fill="#27AE60" stroke="#1A6B3A"/>
  <text x="417" y="192" text-anchor="middle" fill="white" font-size="11">App (liest Header)</text>
  <rect x="355" y="207" width="125" height="28" rx="4" fill="#E74C3C" stroke="#9B2222"/>
  <text x="417" y="226" text-anchor="middle" fill="white" font-size="11">Envoy Sidecar</text>

  <!-- Pod B -->
  <rect x="545" y="130" width="155" height="110" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  <text x="622" y="152" text-anchor="middle" fill="#333" font-weight="bold">Pod: Payment Service</text>
  <text x="622" y="167" text-anchor="middle" fill="#888" font-size="10">SA: payment-service</text>
  <rect x="560" y="173" width="125" height="28" rx="4" fill="#27AE60" stroke="#1A6B3A"/>
  <text x="622" y="192" text-anchor="middle" fill="white" font-size="11">App (liest Header)</text>
  <rect x="560" y="207" width="125" height="28" rx="4" fill="#E74C3C" stroke="#9B2222"/>
  <text x="622" y="226" text-anchor="middle" fill="white" font-size="11">Envoy Sidecar</text>

  <!-- Istiod -> Sidecars (certs) -->
  <line x1="340" y1="68" x2="405" y2="130" stroke="#264653" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <line x1="400" y1="68" x2="600" y2="130" stroke="#264653" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="358" y="105" fill="#264653" font-size="10">SVID (X.509)</text>

  <!-- Keycloak -> Gateway (JWKS) -->
  <line x1="570" y1="65" x2="285" y2="148" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ap)"/>
  <text x="420" y="100" text-anchor="middle" fill="#8E44AD" font-size="10">JWKS Public Keys (gecacht)</text>

  <!-- Client -> Gateway -->
  <line x1="120" y1="185" x2="143" y2="185" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <text x="132" y="178" text-anchor="middle" fill="#555" font-size="10">JWT</text>

  <!-- Gateway -> Pod A (Nord-Sued, mTLS) -->
  <line x1="285" y1="185" x2="338" y2="185" stroke="#27ae60" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="312" y="178" text-anchor="middle" fill="#27ae60" font-size="10" font-weight="bold">mTLS</text>

  <!-- Pod A -> Pod B (Ost-West, mTLS) -->
  <line x1="495" y1="220" x2="543" y2="220" stroke="#27ae60" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="519" y="213" text-anchor="middle" fill="#27ae60" font-size="10" font-weight="bold">mTLS</text>

  <!-- AuthorizationPolicy labels -->
  <rect x="340" y="260" width="155" height="40" rx="5" fill="#e8f4fd" stroke="#4A90D9"/>
  <text x="417" y="277" text-anchor="middle" fill="#2C5F8A" font-size="10" font-weight="bold">AuthorizationPolicy</text>
  <text x="417" y="292" text-anchor="middle" fill="#2C5F8A" font-size="10">JWT-Claims pruefen</text>

  <rect x="545" y="260" width="155" height="40" rx="5" fill="#e8f4fd" stroke="#4A90D9"/>
  <text x="622" y="277" text-anchor="middle" fill="#2C5F8A" font-size="10" font-weight="bold">AuthorizationPolicy</text>
  <text x="622" y="292" text-anchor="middle" fill="#2C5F8A" font-size="10">SA: order-service erlaubt</text>

  <!-- Legend -->
  <rect x="20" y="320" width="695" height="60" rx="6" fill="#fff" stroke="#dee2e6"/>
  <text x="40" y="340" fill="#333" font-size="11" font-weight="bold">Legende:</text>
  <line x1="40" y1="355" x2="90" y2="355" stroke="#27ae60" stroke-width="2.5"/>
  <text x="100" y="359" fill="#555" font-size="11">mTLS (Envoy zu Envoy, automatisch – App-Code sieht das nicht)</text>
  <line x1="40" y1="372" x2="90" y2="372" stroke="#264653" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="100" y="376" fill="#555" font-size="11">Zertifikat-Verteilung durch Istiod (SPIFFE/SVID basierend auf ServiceAccount)</text>
</svg>
