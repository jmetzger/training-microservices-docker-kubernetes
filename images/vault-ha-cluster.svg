<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 310" font-family="Arial, sans-serif">
  <rect width="820" height="310" fill="#f4f6f9" rx="10"/>
  <text x="410" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">HashiCorp Vault — HA Cluster (Raft Storage)</text>

  <!-- Cluster outer box -->
  <rect x="30" y="48" width="530" height="225" rx="10" fill="#1C1C2C" stroke="#FFB300" stroke-width="2"/>
  <text x="295" y="70" text-anchor="middle" font-size="12" fill="#FFB300" font-weight="bold">Vault Cluster</text>

  <!-- Vault Node 1 (Active) -->
  <rect x="55" y="82" width="145" height="80" rx="8" fill="#2a2a3c" stroke="#FFB300" stroke-width="2"/>
  <text x="127" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFB300">Vault 1</text>
  <rect x="65" y="108" width="75" height="18" rx="4" fill="#27ae60"/>
  <text x="102" y="121" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">ACTIVE</text>
  <text x="127" y="153" text-anchor="middle" font-size="9" fill="#aaa">Schreibzugriff</text>

  <!-- Vault Node 2 (Standby) -->
  <rect x="230" y="82" width="145" height="80" rx="8" fill="#2a2a3c" stroke="#888" stroke-width="1.5"/>
  <text x="302" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#ccc">Vault 2</text>
  <rect x="240" y="108" width="75" height="18" rx="4" fill="#7f8c8d"/>
  <text x="277" y="121" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">STANDBY</text>
  <text x="302" y="153" text-anchor="middle" font-size="9" fill="#888">Failover bereit</text>

  <!-- Vault Node 3 (Standby) -->
  <rect x="405" y="82" width="145" height="80" rx="8" fill="#2a2a3c" stroke="#888" stroke-width="1.5"/>
  <text x="477" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#ccc">Vault 3</text>
  <rect x="415" y="108" width="75" height="18" rx="4" fill="#7f8c8d"/>
  <text x="452" y="121" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">STANDBY</text>
  <text x="477" y="153" text-anchor="middle" font-size="9" fill="#888">Failover bereit</text>

  <!-- Arrows between nodes -->
  <line x1="200" y1="122" x2="228" y2="122" stroke="#FFB300" stroke-width="1.5" marker-end="url(#arrVault)" marker-start="url(#arrVaultR)"/>
  <line x1="375" y1="122" x2="403" y2="122" stroke="#FFB300" stroke-width="1.5" marker-end="url(#arrVault)" marker-start="url(#arrVaultR)"/>

  <!-- Raft storage bar -->
  <rect x="55" y="185" width="495" height="72" rx="8" fill="#2a2a3c" stroke="#e67e22" stroke-width="1.5"/>
  <text x="302" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Raft Storage (Integrated)</text>
  <text x="302" y="225" text-anchor="middle" font-size="10" fill="#aaa">Verteiltes Storage-Backend — kein externes Consul/etcd nötig</text>
  <text x="302" y="245" text-anchor="middle" font-size="10" fill="#aaa">Alle Nodes replizieren Daten automatisch untereinander</text>

  <!-- Vertical lines from nodes to raft -->
  <line x1="127" y1="162" x2="127" y2="183" stroke="#FFB300" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="302" y1="162" x2="302" y2="183" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="477" y1="162" x2="477" y2="183" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Pod Auth box (right) -->
  <rect x="600" y="48" width="195" height="225" rx="10" fill="#fff" stroke="#326CE5" stroke-width="2"/>
  <rect x="600" y="48" width="195" height="35" rx="10" fill="#326CE5"/>
  <rect x="600" y="68" width="195" height="15" fill="#326CE5"/>
  <text x="697" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Pod Authentication</text>

  <!-- ServiceAccount icon -->
  <circle cx="697" cy="118" r="22" fill="#EBF5FB" stroke="#326CE5" stroke-width="1.5"/>
  <text x="697" y="113" text-anchor="middle" font-size="9" fill="#326CE5" font-weight="bold">Service</text>
  <text x="697" y="126" text-anchor="middle" font-size="9" fill="#326CE5" font-weight="bold">Account</text>

  <text x="697" y="162" text-anchor="middle" font-size="10" fill="#555">Pod präsentiert</text>
  <text x="697" y="176" text-anchor="middle" font-size="10" fill="#555">sein JWT-Token</text>
  <text x="697" y="195" text-anchor="middle" font-size="10" fill="#555">Vault prüft gegen</text>
  <text x="697" y="209" text-anchor="middle" font-size="10" fill="#555">Kubernetes API</text>
  <text x="697" y="228" text-anchor="middle" font-size="10" fill="#555">→ Policy wird zugewiesen</text>
  <text x="697" y="248" text-anchor="middle" font-size="9" font-style="italic" fill="#326CE5">kein Passwort nötig</text>

  <!-- Arrow from cluster to pod auth -->
  <line x1="562" y1="160" x2="598" y2="160" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGray)"/>

  <!-- Unseal warning -->
  <rect x="30" y="278" width="530" height="25" rx="5" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="295" y="294" text-anchor="middle" font-size="10" fill="#c0392b">⚠ Nach Neustart muss Vault manuell entsiegelt (unsealed) werden — oder Auto-Unseal via AWS KMS / Azure Key Vault konfigurieren</text>

  <defs>
    <marker id="arrVault" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#FFB300"/>
    </marker>
    <marker id="arrVaultR" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L7,3 z" fill="#FFB300"/>
    </marker>
    <marker id="arrGray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#aaa"/>
    </marker>
  </defs>
</svg>
