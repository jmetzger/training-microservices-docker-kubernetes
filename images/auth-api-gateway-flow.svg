<svg viewBox="0 0 740 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Internet -->
  <rect x="5" y="30" width="120" height="320" rx="8" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="65" y="50" text-anchor="middle" fill="#e74c3c" font-weight="bold">Internet</text>

  <rect x="18" y="62" width="95" height="40" rx="6" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <text x="65" y="78" text-anchor="middle" fill="white" font-weight="bold">Mobile App</text>
  <text x="65" y="93" text-anchor="middle" fill="#ddf" font-size="10">Bearer JWT</text>

  <rect x="18" y="117" width="95" height="40" rx="6" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <text x="65" y="133" text-anchor="middle" fill="white" font-weight="bold">Browser SPA</text>
  <text x="65" y="148" text-anchor="middle" fill="#ddf" font-size="10">Bearer JWT</text>

  <rect x="18" y="172" width="95" height="40" rx="6" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <text x="65" y="188" text-anchor="middle" fill="white" font-weight="bold">Partner API</text>
  <text x="65" y="203" text-anchor="middle" fill="#ddf" font-size="10">API-Key</text>

  <!-- Kubernetes Cluster -->
  <rect x="145" y="10" width="585" height="355" rx="10" fill="#f0f4f8" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="438" y="27" text-anchor="middle" fill="#4A90D9" font-weight="bold">Kubernetes Cluster</text>

  <!-- API Gateway box -->
  <rect x="163" y="40" width="185" height="295" rx="8" fill="#1a252f" stroke="#0d1b24" stroke-width="2"/>
  <text x="255" y="63" text-anchor="middle" fill="white" font-size="13" font-weight="bold">API Gateway</text>
  <text x="255" y="80" text-anchor="middle" fill="#aad4e5" font-size="10">Kong / APISIX / Tyk</text>

  <!-- Plugin boxes inside gateway -->
  <rect x="175" y="92" width="160" height="30" rx="4" fill="#16a085"/>
  <text x="255" y="112" text-anchor="middle" fill="white" font-size="11">JWT / OIDC Plugin</text>

  <rect x="175" y="128" width="160" height="30" rx="4" fill="#16a085"/>
  <text x="255" y="148" text-anchor="middle" fill="white" font-size="11">Key-Auth Plugin</text>

  <rect x="175" y="164" width="160" height="30" rx="4" fill="#2980b9"/>
  <text x="255" y="184" text-anchor="middle" fill="white" font-size="11">Rate Limiting</text>

  <rect x="175" y="200" width="160" height="30" rx="4" fill="#2980b9"/>
  <text x="255" y="220" text-anchor="middle" fill="white" font-size="11">Request Transformation</text>

  <rect x="175" y="236" width="160" height="30" rx="4" fill="#2980b9"/>
  <text x="255" y="256" text-anchor="middle" fill="white" font-size="11">Routing / Load Balancing</text>

  <rect x="175" y="272" width="160" height="30" rx="4" fill="#8e44ad"/>
  <text x="255" y="292" text-anchor="middle" fill="white" font-size="11">Consumer Management</text>

  <rect x="175" y="308" width="160" height="20" rx="4" fill="#555"/>
  <text x="255" y="322" text-anchor="middle" fill="#aaa" font-size="10">JWKS ← Keycloak/Auth0</text>

  <!-- Arrows from internet to gateway -->
  <line x1="113" y1="82" x2="161" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="113" y1="137" x2="161" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="113" y1="192" x2="161" y2="163" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Services -->
  <rect x="415" y="60" width="140" height="50" rx="6" fill="#27AE60" stroke="#1A6B3A" stroke-width="2"/>
  <text x="485" y="83" text-anchor="middle" fill="white" font-weight="bold">Order Service</text>
  <text x="485" y="99" text-anchor="middle" fill="#dff" font-size="10">kein Auth-Code noetig</text>

  <rect x="415" y="135" width="140" height="50" rx="6" fill="#27AE60" stroke="#1A6B3A" stroke-width="2"/>
  <text x="485" y="158" text-anchor="middle" fill="white" font-weight="bold">Payment Service</text>
  <text x="485" y="174" text-anchor="middle" fill="#dff" font-size="10">kein Auth-Code noetig</text>

  <rect x="415" y="210" width="140" height="50" rx="6" fill="#27AE60" stroke="#1A6B3A" stroke-width="2"/>
  <text x="485" y="233" text-anchor="middle" fill="white" font-weight="bold">Product Service</text>
  <text x="485" y="249" text-anchor="middle" fill="#dff" font-size="10">kein Auth-Code noetig</text>

  <!-- Arrows gateway to services -->
  <line x1="348" y1="160" x2="413" y2="95" stroke="#27ae60" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="348" y1="185" x2="413" y2="165" stroke="#27ae60" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="348" y1="210" x2="413" y2="238" stroke="#27ae60" stroke-width="2" marker-end="url(#ag)"/>

  <text x="385" y="148" text-anchor="middle" fill="#27ae60" font-size="10">X-Consumer-Id</text>
  <text x="385" y="160" text-anchor="middle" fill="#27ae60" font-size="10">X-Consumer-Username</text>

  <!-- Ost-West ungesichert annotation -->
  <rect x="415" y="285" width="295" height="35" rx="5" fill="#fffde7" stroke="#f9ca24" stroke-width="1.5"/>
  <text x="563" y="302" text-anchor="middle" fill="#555" font-size="11" font-weight="bold">Ost-West bleibt ungeschuetzt!</text>
  <text x="563" y="316" text-anchor="middle" fill="#888" font-size="10">Service A → B ohne Auth → Istio noetig</text>
</svg>
