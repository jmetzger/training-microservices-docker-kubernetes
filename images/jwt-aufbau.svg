<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="monospace, sans-serif">
  <rect width="820" height="320" fill="#0f172a" rx="12"/>
  <text x="410" y="36" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold" font-family="sans-serif">JWT – Aufbau (3 Teile)</text>

  <!-- Header Teil -->
  <rect x="30" y="60" width="220" height="80" rx="8" fill="#1e3a5f"/>
  <text x="140" y="88" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">HEADER</text>
  <text x="140" y="108" text-anchor="middle" fill="#bfdbfe" font-size="11">Algorithm &amp; Token Type</text>
  <rect x="50" y="118" width="180" height="22" rx="4" fill="#0f172a"/>
  <text x="140" y="133" text-anchor="middle" fill="#60a5fa" font-size="10">{ "alg": "RS256", "typ": "JWT" }</text>

  <!-- Punkt 1 -->
  <text x="258" y="102" text-anchor="middle" fill="#94a3b8" font-size="28" font-weight="bold">.</text>

  <!-- Payload Teil -->
  <rect x="270" y="60" width="280" height="150" rx="8" fill="#14532d"/>
  <text x="410" y="88" text-anchor="middle" fill="#86efac" font-size="13" font-weight="bold">PAYLOAD (Claims)</text>
  <rect x="285" y="98" width="250" height="100" rx="4" fill="#0f172a"/>
  <text x="300" y="116" fill="#4ade80" font-size="10">{</text>
  <text x="310" y="132" fill="#86efac" font-size="10">"sub": "user-42",</text>
  <text x="310" y="148" fill="#86efac" font-size="10">"email": "user@example.com",</text>
  <text x="310" y="164" fill="#86efac" font-size="10">"roles": ["admin"],</text>
  <text x="310" y="180" fill="#86efac" font-size="10">"exp": 1716000300</text>
  <text x="300" y="196" fill="#4ade80" font-size="10">}</text>

  <!-- Punkt 2 -->
  <text x="558" y="102" text-anchor="middle" fill="#94a3b8" font-size="28" font-weight="bold">.</text>

  <!-- Signatur Teil -->
  <rect x="570" y="60" width="220" height="80" rx="8" fill="#4a1942"/>
  <text x="680" y="88" text-anchor="middle" fill="#f0abfc" font-size="13" font-weight="bold">SIGNATUR</text>
  <text x="680" y="108" text-anchor="middle" fill="#e879f9" font-size="11">RSA Private Key (Keycloak)</text>
  <rect x="585" y="118" width="190" height="22" rx="4" fill="#0f172a"/>
  <text x="680" y="133" text-anchor="middle" fill="#d946ef" font-size="10">SflKxwRJSMeKKF2QT4fwpMeJf...</text>

  <!-- Encoded Token -->
  <rect x="30" y="230" width="760" height="50" rx="8" fill="#1e293b"/>
  <text x="410" y="250" text-anchor="middle" fill="#94a3b8" font-size="11">Encoded (Base64Url)</text>
  <text x="410" y="270" text-anchor="middle" font-size="10">
    <tspan fill="#60a5fa">eyJhbGciOiJSUzI1NiJ9</tspan>
    <tspan fill="#94a3b8">.</tspan>
    <tspan fill="#4ade80">eyJzdWIiOiJ1c2VyLTQyIiwiZW1haWwiOiJ1c2VyQGV4YW1wbGUuY29tIn0</tspan>
    <tspan fill="#94a3b8">.</tspan>
    <tspan fill="#d946ef">SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c</tspan>
  </text>

  <!-- Pfeile nach unten -->
  <line x1="140" y1="148" x2="140" y2="222" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="135,220 145,220 140,228" fill="#60a5fa"/>
  <line x1="410" y1="218" x2="410" y2="222" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="405,220 415,220 410,228" fill="#4ade80"/>
  <line x1="680" y1="148" x2="680" y2="222" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="675,220 685,220 680,228" fill="#d946ef"/>

  <!-- Hinweis -->
  <text x="410" y="310" text-anchor="middle" fill="#475569" font-size="10">Keycloak signiert mit Private Key · Empfanger verifiziert mit Public Key (JWKS-Endpoint)</text>
</svg>
