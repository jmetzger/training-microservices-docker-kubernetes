<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f4f6f9" rx="10"/>
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Weg 3: External Secrets Operator (ESO)</text>

  <!-- ExternalSecret resource -->
  <rect x="20" y="50" width="175" height="135" rx="8" fill="#fff" stroke="#16a085" stroke-width="2"/>
  <rect x="20" y="50" width="175" height="32" rx="8" fill="#16a085"/>
  <rect x="20" y="70" width="175" height="12" fill="#16a085"/>
  <text x="107" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ExternalSecret</text>
  <text x="35" y="100" font-size="9" fill="#555" font-family="monospace">kind: ExternalSecret</text>
  <text x="35" y="114" font-size="9" fill="#555" font-family="monospace">refreshInterval: 1h</text>
  <text x="35" y="128" font-size="9" fill="#555" font-family="monospace">secretStoreRef:</text>
  <text x="35" y="142" font-size="9" fill="#555" font-family="monospace">  name: vault-backend</text>
  <text x="35" y="156" font-size="9" fill="#555" font-family="monospace">target:</text>
  <text x="35" y="170" font-size="9" fill="#555" font-family="monospace">  name: my-app-secret</text>

  <!-- Arrow: ExternalSecret → ESO -->
  <line x1="197" y1="117" x2="238" y2="117" stroke="#16a085" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="218" y="111" text-anchor="middle" font-size="9" fill="#16a085">liest</text>

  <!-- ESO Controller box -->
  <rect x="240" y="50" width="195" height="135" rx="8" fill="#fff" stroke="#16a085" stroke-width="2"/>
  <rect x="240" y="50" width="195" height="32" rx="8" fill="#16a085"/>
  <rect x="240" y="70" width="195" height="12" fill="#16a085"/>
  <text x="337" y="71" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ESO Controller</text>
  <text x="337" y="100" text-anchor="middle" font-size="10" fill="#555">Läuft im Cluster als</text>
  <text x="337" y="115" text-anchor="middle" font-size="10" fill="#555">Kubernetes Operator</text>
  <text x="337" y="135" text-anchor="middle" font-size="10" fill="#555">Beobachtet alle</text>
  <text x="337" y="150" text-anchor="middle" font-size="10" fill="#555">ExternalSecret-Objekte</text>
  <text x="337" y="170" text-anchor="middle" font-size="9" font-style="italic" fill="#16a085">alle refreshInterval</text>

  <!-- Arrow: ESO → Vault (up-right) -->
  <line x1="437" y1="90" x2="555" y2="70" stroke="#16a085" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>
  <text x="495" y="73" text-anchor="middle" font-size="9" fill="#16a085">holt Secret</text>

  <!-- Arrow: ESO → K8s Secret (down) -->
  <line x1="337" y1="187" x2="337" y2="222" stroke="#16a085" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="370" y="210" font-size="9" fill="#16a085">erstellt/aktualisiert</text>

  <!-- Vault box (top right) -->
  <rect x="555" y="48" width="170" height="125" rx="10" fill="#1C1C2C" stroke="#FFB300" stroke-width="2"/>
  <text x="640" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFB300">HashiCorp Vault</text>
  <line x1="565" y1="78" x2="715" y2="78" stroke="#FFB300" stroke-width="1" opacity="0.4"/>
  <text x="640" y="100" text-anchor="middle" font-size="10" fill="#aaa">secret/my-app/db</text>
  <text x="640" y="118" text-anchor="middle" font-size="10" fill="#27ae60">✓ Encrypted</text>
  <text x="640" y="133" text-anchor="middle" font-size="10" fill="#27ae60">✓ Audit-Log</text>
  <text x="640" y="148" text-anchor="middle" font-size="10" fill="#27ae60">✓ Auto-Rotation</text>
  <text x="640" y="163" text-anchor="middle" font-size="10" fill="#aaa">Viele Backends</text>

  <!-- K8s Secret box -->
  <rect x="200" y="225" width="275" height="75" rx="8" fill="#fff" stroke="#326CE5" stroke-width="2"/>
  <rect x="200" y="225" width="275" height="28" rx="8" fill="#326CE5"/>
  <rect x="200" y="242" width="275" height="11" fill="#326CE5"/>
  <text x="337" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Kubernetes Secret (automatisch erstellt)</text>
  <text x="337" y="270" text-anchor="middle" font-size="10" fill="#555">kind: Secret  |  name: my-app-secret</text>
  <text x="337" y="285" text-anchor="middle" font-size="10" fill="#555">data: { password: &lt;base64&gt; }  ← aus Vault geholt</text>

  <!-- Arrow: K8s Secret → Pod -->
  <line x1="477" y1="262" x2="550" y2="262" stroke="#326CE5" stroke-width="1.5" marker-end="url(#arrK8s)"/>

  <!-- Pod box -->
  <rect x="552" y="220" width="245" height="82" rx="8" fill="#EBF5FB" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="674" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#326CE5">Pod / App</text>
  <text x="674" y="260" text-anchor="middle" font-size="10" fill="#555">nutzt normales K8s Secret</text>
  <text x="674" y="275" text-anchor="middle" font-size="10" fill="#555">als Env-Variable oder Volume</text>
  <text x="674" y="292" text-anchor="middle" font-size="10" font-style="italic" fill="#326CE5">keine Vault-Kenntnisse nötig</text>

  <!-- Note: Secret in etcd -->
  <rect x="20" y="258" width="175" height="52" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="107" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">⚠ Hinweis</text>
  <text x="107" y="291" text-anchor="middle" font-size="9" fill="#c0392b">K8s Secret liegt kurzzeitig</text>
  <text x="107" y="304" text-anchor="middle" font-size="9" fill="#c0392b">in etcd (RBAC beachten)</text>

  <defs>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#16a085"/>
    </marker>
    <marker id="arrK8s" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#326CE5"/>
    </marker>
  </defs>
</svg>
