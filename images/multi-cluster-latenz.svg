<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 370" font-family="Arial, sans-serif">
  <rect width="820" height="370" fill="#f4f6f9" rx="10"/>
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Warum Nodes nicht einfach in verschiedene Regionen verteilt werden koennen</text>

  <!-- Section: NOT possible -->
  <rect x="20" y="50" width="780" height="140" rx="8" fill="#fdecea" stroke="#e74c3c" stroke-width="2"/>
  <text x="410" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Nicht moeglich: Ein Cluster ueber verschiedene Regionen</text>

  <!-- Frankfurt box -->
  <rect x="60" y="88" width="160" height="80" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="140" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Frankfurt</text>
  <text x="140" y="130" text-anchor="middle" font-size="10" fill="#555">Control Plane</text>
  <text x="140" y="146" text-anchor="middle" font-size="10" fill="#555">etcd Leader</text>
  <text x="140" y="162" text-anchor="middle" font-size="9" fill="#888">RZ Europa</text>

  <!-- Virginia box -->
  <rect x="600" y="88" width="160" height="80" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="680" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Virginia (USA)</text>
  <text x="680" y="130" text-anchor="middle" font-size="10" fill="#555">Node</text>
  <text x="680" y="146" text-anchor="middle" font-size="10" fill="#555">(geplanter Betrieb)</text>
  <text x="680" y="162" text-anchor="middle" font-size="9" fill="#888">RZ Nordamerika</text>

  <!-- Red crossed arrow -->
  <line x1="222" y1="128" x2="598" y2="128" stroke="#e74c3c" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="410" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">~ 90 ms Latenz</text>
  <text x="410" y="148" text-anchor="middle" font-size="10" fill="#c0392b">etcd benoetigt &lt; 10 ms — das ist das 9-fache!</text>

  <!-- X symbol -->
  <circle cx="410" cy="128" r="14" fill="#e74c3c"/>
  <text x="410" y="133" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">✗</text>

  <!-- Section: POSSIBLE -->
  <rect x="20" y="210" width="780" height="140" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="410" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">Moeglich: Nodes innerhalb einer Region / Stadt</text>

  <!-- RZ1 box -->
  <rect x="60" y="248" width="160" height="80" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="140" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Frankfurt RZ-1</text>
  <text x="140" y="290" text-anchor="middle" font-size="10" fill="#555">Control Plane</text>
  <text x="140" y="306" text-anchor="middle" font-size="10" fill="#555">etcd Leader</text>
  <text x="140" y="322" text-anchor="middle" font-size="9" fill="#888">Rechenzentrum A</text>

  <!-- RZ2 box -->
  <rect x="600" y="248" width="160" height="80" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <text x="680" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Frankfurt RZ-2</text>
  <text x="680" y="290" text-anchor="middle" font-size="10" fill="#555">Worker Nodes</text>
  <text x="680" y="306" text-anchor="middle" font-size="10" fill="#555">etcd Follower</text>
  <text x="680" y="322" text-anchor="middle" font-size="9" fill="#888">Rechenzentrum B (~5 km)</text>

  <!-- Green arrow -->
  <line x1="222" y1="288" x2="598" y2="288" stroke="#27ae60" stroke-width="3"/>
  <text x="410" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">~ 0,5 ms Latenz</text>
  <text x="410" y="308" text-anchor="middle" font-size="10" fill="#1e8449">Weit unter der 10 ms-Grenze — problemlos</text>

  <!-- Check symbol -->
  <circle cx="410" cy="288" r="14" fill="#27ae60"/>
  <text x="410" y="293" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">✓</text>

  <defs>
    <marker id="arrRed" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#27ae60"/>
    </marker>
  </defs>
</svg>
