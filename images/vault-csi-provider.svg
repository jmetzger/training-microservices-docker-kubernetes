<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 310" font-family="Arial, sans-serif">
  <rect width="820" height="310" fill="#f4f6f9" rx="10"/>
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Weg 2: Vault CSI Provider</text>

  <!-- Pod box -->
  <rect x="30" y="48" width="310" height="175" rx="10" fill="#EBF5FB" stroke="#326CE5" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="185" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#326CE5">Pod</text>

  <!-- App Container -->
  <rect x="50" y="78" width="185" height="130" rx="8" fill="#fff" stroke="#326CE5" stroke-width="1.5"/>
  <rect x="50" y="78" width="185" height="32" rx="8" fill="#326CE5"/>
  <rect x="50" y="98" width="185" height="12" fill="#326CE5"/>
  <text x="142" y="99" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App Container</text>
  <text x="142" y="128" text-anchor="middle" font-size="10" fill="#555">liest Secret aus:</text>
  <rect x="62" y="135" width="160" height="22" rx="4" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="142" y="150" text-anchor="middle" font-size="10" fill="#333" font-family="monospace">/mnt/secrets/password</text>
  <text x="142" y="183" text-anchor="middle" font-size="10" fill="#555">Kein Sidecar-Container</text>
  <text x="142" y="198" text-anchor="middle" font-size="10" fill="#555">→ weniger Overhead</text>

  <!-- CSI Volume indicator -->
  <rect x="248" y="105" width="80" height="105" rx="6" fill="#FFF9C4" stroke="#f39c12" stroke-width="1.5"/>
  <text x="288" y="125" text-anchor="middle" font-size="9" font-weight="bold" fill="#e67e22">CSI</text>
  <text x="288" y="139" text-anchor="middle" font-size="9" font-weight="bold" fill="#e67e22">Volume</text>
  <text x="288" y="160" text-anchor="middle" font-size="9" fill="#666">secrets-store</text>
  <text x="288" y="174" text-anchor="middle" font-size="9" fill="#666">.csi.k8s.io</text>
  <text x="288" y="196" text-anchor="middle" font-size="8" fill="#888">gemountet</text>

  <!-- Arrow: CSI Volume → App -->
  <line x1="246" y1="157" x2="236" y2="157" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrOrange2)"/>

  <!-- Arrow down from CSI Volume to CSI Driver -->
  <line x1="288" y1="212" x2="288" y2="240" stroke="#2980b9" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- CSI Driver box -->
  <rect x="100" y="243" width="380" height="55" rx="8" fill="#fff" stroke="#2980b9" stroke-width="2"/>
  <rect x="100" y="243" width="380" height="25" rx="8" fill="#2980b9"/>
  <rect x="100" y="257" width="380" height="11" fill="#2980b9"/>
  <text x="290" y="259" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Secrets Store CSI Driver (DaemonSet auf jedem Node)</text>
  <text x="290" y="285" text-anchor="middle" font-size="10" fill="#444">Liest SecretProviderClass — verbindet Kubernetes mit externem Secret-Backend</text>

  <!-- Arrow: CSI Driver → Vault -->
  <line x1="482" y1="270" x2="555" y2="200" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrBlue)"/>

  <!-- Vault box -->
  <rect x="555" y="48" width="175" height="175" rx="10" fill="#1C1C2C" stroke="#FFB300" stroke-width="2"/>
  <text x="642" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFB300">HashiCorp</text>
  <text x="642" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFB300">Vault</text>
  <line x1="565" y1="95" x2="720" y2="95" stroke="#FFB300" stroke-width="1" opacity="0.4"/>
  <text x="642" y="118" text-anchor="middle" font-size="10" fill="#aaa">secret/data/</text>
  <text x="642" y="133" text-anchor="middle" font-size="10" fill="#aaa">my-app/db</text>
  <text x="642" y="160" text-anchor="middle" font-size="10" fill="#27ae60">✓ kein Secret in etcd</text>
  <text x="642" y="178" text-anchor="middle" font-size="10" fill="#27ae60">✓ kein Sidecar</text>
  <text x="642" y="196" text-anchor="middle" font-size="10" fill="#27ae60">✓ Multi-Cloud fähig</text>

  <!-- SecretProviderClass note -->
  <rect x="555" y="235" width="235" height="65" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="672" y="253" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">SecretProviderClass</text>
  <text x="672" y="270" text-anchor="middle" font-size="9" fill="#444">Definiert: welches Secret aus</text>
  <text x="672" y="284" text-anchor="middle" font-size="9" fill="#444">welchem Backend — einmalig</text>
  <text x="672" y="298" text-anchor="middle" font-size="9" fill="#444">pro Namespace konfiguriert</text>

  <defs>
    <marker id="arrOrange2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f39c12"/>
    </marker>
    <marker id="arrBlue" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2980b9"/>
    </marker>
  </defs>
</svg>
