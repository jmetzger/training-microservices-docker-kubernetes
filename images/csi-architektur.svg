<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="Arial, sans-serif">
  <rect width="820" height="440" fill="#f4f6f9" rx="10"/>
  <text x="410" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Container Storage Interface (CSI) — Architektur</text>

  <!-- Kubernetes Control Plane -->
  <rect x="20" y="48" width="780" height="70" rx="8" fill="#1a1a2e" stroke="#e67e22" stroke-width="2"/>
  <text x="410" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">Kubernetes Control Plane</text>
  <rect x="60" y="82" width="180" height="28" rx="5" fill="#2c3e50"/>
  <text x="150" y="100" text-anchor="middle" font-size="10" fill="#ccc">kube-apiserver</text>
  <rect x="260" y="82" width="180" height="28" rx="5" fill="#2c3e50"/>
  <text x="350" y="100" text-anchor="middle" font-size="10" fill="#ccc">kube-controller-manager</text>
  <rect x="460" y="82" width="180" height="28" rx="5" fill="#2c3e50"/>
  <text x="550" y="100" text-anchor="middle" font-size="10" fill="#ccc">external-provisioner (CSI)</text>

  <!-- Arrow down to CSI layers -->
  <line x1="410" y1="118" x2="410" y2="148" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrGray)"/>

  <!-- CSI Controller Plugin -->
  <rect x="20" y="155" width="370" height="110" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
  <rect x="20" y="155" width="370" height="30" rx="8" fill="#2980b9"/>
  <rect x="20" y="172" width="370" height="13" fill="#2980b9"/>
  <text x="205" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">CSI Controller Plugin</text>
  <text x="205" y="200" text-anchor="middle" font-size="10" fill="#1a5276">(laeuft einmal im Cluster, z.B. als Deployment)</text>
  <rect x="40" y="210" width="155" height="40" rx="5" fill="#fff" stroke="#2980b9" stroke-width="1"/>
  <text x="118" y="228" text-anchor="middle" font-size="9" fill="#333">CreateVolume</text>
  <text x="118" y="242" text-anchor="middle" font-size="9" fill="#333">DeleteVolume</text>
  <rect x="215" y="210" width="155" height="40" rx="5" fill="#fff" stroke="#2980b9" stroke-width="1"/>
  <text x="293" y="228" text-anchor="middle" font-size="9" fill="#333">AttachVolume</text>
  <text x="293" y="242" text-anchor="middle" font-size="9" fill="#333">CreateSnapshot</text>

  <!-- CSI Node Plugin -->
  <rect x="430" y="155" width="370" height="110" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <rect x="430" y="155" width="370" height="30" rx="8" fill="#27ae60"/>
  <rect x="430" y="172" width="370" height="13" fill="#27ae60"/>
  <text x="615" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">CSI Node Plugin</text>
  <text x="615" y="200" text-anchor="middle" font-size="10" fill="#1e8449">(laeuft auf jedem Worker-Node als DaemonSet)</text>
  <rect x="450" y="210" width="155" height="40" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="528" y="228" text-anchor="middle" font-size="9" fill="#333">NodeStageVolume</text>
  <text x="528" y="242" text-anchor="middle" font-size="9" fill="#333">NodePublishVolume</text>
  <rect x="625" y="210" width="155" height="40" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="703" y="228" text-anchor="middle" font-size="9" fill="#333">NodeGetCapabilities</text>
  <text x="703" y="242" text-anchor="middle" font-size="9" fill="#333">NodeUnpublishVolume</text>

  <!-- Arrow down -->
  <line x1="205" y1="265" x2="205" y2="295" stroke="#2980b9" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="615" y1="265" x2="615" y2="295" stroke="#27ae60" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Storage Backend -->
  <rect x="20" y="300" width="370" height="60" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
  <text x="205" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#784212">Storage Backend</text>
  <text x="205" y="340" text-anchor="middle" font-size="10" fill="#784212">NFS / Ceph / AWS EBS / Azure Disk / GCP PD ...</text>
  <text x="205" y="354" text-anchor="middle" font-size="9" fill="#a04000">Jeder Anbieter liefert seinen eigenen CSI-Treiber</text>

  <!-- Pod mit PVC -->
  <rect x="430" y="300" width="370" height="60" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="615" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e8449">Pod + PersistentVolumeClaim</text>
  <text x="615" y="340" text-anchor="middle" font-size="10" fill="#555">Pod referenziert PVC → PVC bound an PV</text>
  <text x="615" y="354" text-anchor="middle" font-size="9" fill="#888">Volume wird automatisch bereitgestellt und gemountet</text>

  <!-- StorageClass box -->
  <rect x="220" y="378" width="380" height="48" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="410" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">StorageClass</text>
  <text x="410" y="416" text-anchor="middle" font-size="10" fill="#7d6608">Verbindet Treiber + Parameter — definiert "wie" ein Volume provisioniert wird</text>

  <line x1="205" y1="360" x2="300" y2="378" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrOrange)"/>
  <line x1="615" y1="360" x2="520" y2="378" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>

  <defs>
    <marker id="arrGray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrBlue" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrOrange" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>
