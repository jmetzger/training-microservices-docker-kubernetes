<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="Arial, sans-serif">
  <rect width="820" height="420" fill="#f4f6f9" rx="10"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Secrets in Kubernetes mit HashiCorp Vault</text>

  <!-- ── Problem box (left) ── -->
  <rect x="20" y="55" width="340" height="190" rx="10" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <rect x="20" y="55" width="340" height="40" rx="10" fill="#e74c3c"/>
  <rect x="20" y="80" width="340" height="15" fill="#e74c3c"/>
  <text x="190" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Das Problem: K8s Secrets</text>
  <circle cx="45" cy="115" r="5" fill="#e74c3c"/>
  <text x="58" y="119" font-size="11" fill="#333">Base64 ≠ Verschlüsselung (sofort dekodierbar)</text>
  <circle cx="45" cy="140" r="5" fill="#e74c3c"/>
  <text x="58" y="144" font-size="11" fill="#333">etcd speichert Secrets unverschlüsselt</text>
  <circle cx="45" cy="165" r="5" fill="#e74c3c"/>
  <text x="58" y="169" font-size="11" fill="#333">Kein Audit-Log (wer hat was gelesen?)</text>
  <circle cx="45" cy="190" r="5" fill="#e74c3c"/>
  <text x="58" y="194" font-size="11" fill="#333">Keine Rotation, keine Ablaufzeiten</text>
  <circle cx="45" cy="215" r="5" fill="#e74c3c"/>
  <text x="58" y="219" font-size="11" fill="#333">Secrets landen versehentlich im Git</text>

  <!-- Arrow → -->
  <line x1="362" y1="150" x2="455" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="409" y="144" text-anchor="middle" font-size="10" fill="#888">löst</text>

  <!-- ── Vault box (right) ── -->
  <rect x="460" y="55" width="340" height="190" rx="10" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <rect x="460" y="55" width="340" height="40" rx="10" fill="#1C1C2C"/>
  <rect x="460" y="80" width="340" height="15" fill="#1C1C2C"/>
  <text x="630" y="81" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFB300">HashiCorp Vault</text>
  <circle cx="485" cy="115" r="5" fill="#27ae60"/>
  <text x="498" y="119" font-size="11" fill="#333">AES-256 Verschlüsselung aller Secrets</text>
  <circle cx="485" cy="140" r="5" fill="#27ae60"/>
  <text x="498" y="144" font-size="11" fill="#333">Vollständiger Audit-Log jedes Zugriffs</text>
  <circle cx="485" cy="165" r="5" fill="#27ae60"/>
  <text x="498" y="169" font-size="11" fill="#333">Dynamic Secrets + automatische Rotation</text>
  <circle cx="485" cy="190" r="5" fill="#27ae60"/>
  <text x="498" y="194" font-size="11" fill="#333">Feingranulare Policies pro App/Team</text>
  <circle cx="485" cy="215" r="5" fill="#27ae60"/>
  <text x="498" y="219" font-size="11" fill="#333">Kubernetes Auth via ServiceAccount</text>

  <!-- Arrow down from center to 3 ways -->
  <line x1="410" y1="248" x2="410" y2="278" stroke="#555" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="410" y="270" text-anchor="middle" font-size="10" fill="#888">3 Integrationswege</text>

  <!-- ── Box 1: Agent Injector ── -->
  <rect x="20" y="285" width="240" height="115" rx="10" fill="#fff" stroke="#8e44ad" stroke-width="2"/>
  <rect x="20" y="285" width="240" height="35" rx="10" fill="#8e44ad"/>
  <rect x="20" y="305" width="240" height="15" fill="#8e44ad"/>
  <text x="140" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">① Vault Agent Injector</text>
  <text x="35" y="340" font-size="10" fill="#444">Sidecar-Container holt Secret</text>
  <text x="35" y="355" font-size="10" fill="#444">aus Vault und schreibt es als</text>
  <text x="35" y="370" font-size="10" fill="#444">Datei ins Pod-Volume.</text>
  <text x="35" y="390" font-size="10" font-style="italic" fill="#8e44ad">Secret nie in etcd gespeichert.</text>

  <!-- ── Box 2: CSI Provider ── -->
  <rect x="290" y="285" width="240" height="115" rx="10" fill="#fff" stroke="#2980b9" stroke-width="2"/>
  <rect x="290" y="285" width="240" height="35" rx="10" fill="#2980b9"/>
  <rect x="290" y="305" width="240" height="15" fill="#2980b9"/>
  <text x="410" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">② Vault CSI Provider</text>
  <text x="305" y="340" font-size="10" fill="#444">CSI Driver mountet Secret als</text>
  <text x="305" y="355" font-size="10" fill="#444">Volume. Kein Sidecar nötig.</text>
  <text x="305" y="370" font-size="10" fill="#444">Funktioniert auch mit AWS/Azure.</text>
  <text x="305" y="390" font-size="10" font-style="italic" fill="#2980b9">Secret nie in etcd gespeichert.</text>

  <!-- ── Box 3: ESO ── -->
  <rect x="560" y="285" width="240" height="115" rx="10" fill="#fff" stroke="#16a085" stroke-width="2"/>
  <rect x="560" y="285" width="240" height="35" rx="10" fill="#16a085"/>
  <rect x="560" y="305" width="240" height="15" fill="#16a085"/>
  <text x="680" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">③ External Secrets Operator</text>
  <text x="575" y="340" font-size="10" fill="#444">Operator erstellt automatisch</text>
  <text x="575" y="355" font-size="10" fill="#444">normale K8s Secrets aus Vault.</text>
  <text x="575" y="370" font-size="10" fill="#444">App merkt nichts von Vault.</text>
  <text x="575" y="390" font-size="10" font-style="italic" fill="#16a085">Einfachste Migration bestehender Apps.</text>

  <!-- Arrows from vault box to 3 boxes -->
  <line x1="560" y1="245" x2="140" y2="283" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="630" y1="247" x2="410" y2="283" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="700" y1="245" x2="680" y2="283" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
