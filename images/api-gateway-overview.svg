<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="Arial, sans-serif">
  <rect width="820" height="400" fill="#f4f6f9" rx="10"/>
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">API Gateway — Position in der Microservices-Architektur</text>

  <!-- Clients (left column) -->
  <text x="80" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">Clients</text>

  <rect x="20" y="78" width="120" height="40" rx="8" fill="#fff" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="80" y="103" text-anchor="middle" font-size="11" fill="#333">Browser / SPA</text>

  <rect x="20" y="132" width="120" height="40" rx="8" fill="#fff" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="80" y="157" text-anchor="middle" font-size="11" fill="#333">Mobile App</text>

  <rect x="20" y="186" width="120" height="40" rx="8" fill="#fff" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="80" y="211" text-anchor="middle" font-size="11" fill="#333">Partner API</text>

  <rect x="20" y="240" width="120" height="40" rx="8" fill="#fff" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="80" y="265" text-anchor="middle" font-size="11" fill="#333">3rd-Party</text>

  <!-- Arrows clients → gateway -->
  <line x1="142" y1="98" x2="238" y2="185" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <line x1="142" y1="152" x2="238" y2="196" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <line x1="142" y1="206" x2="238" y2="207" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <line x1="142" y1="260" x2="238" y2="218" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrGray)"/>

  <!-- API Gateway box (center) -->
  <rect x="240" y="130" width="200" height="160" rx="10" fill="#1a1a2e" stroke="#e67e22" stroke-width="2.5"/>
  <text x="340" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">API Gateway</text>
  <line x1="250" y1="162" x2="430" y2="162" stroke="#e67e22" stroke-width="1" opacity="0.5"/>

  <text x="258" y="180" font-size="9.5" fill="#ccc">🔐 Authentifizierung / AuthZ</text>
  <text x="258" y="196" font-size="9.5" fill="#ccc">🚦 Rate Limiting</text>
  <text x="258" y="212" font-size="9.5" fill="#ccc">🔀 Routing zu Services</text>
  <text x="258" y="228" font-size="9.5" fill="#ccc">📦 Request/Response Transform</text>
  <text x="258" y="244" font-size="9.5" fill="#ccc">📊 Logging &amp; Monitoring</text>
  <text x="258" y="260" font-size="9.5" fill="#ccc">🛡 TLS Terminierung</text>
  <text x="258" y="276" font-size="9.5" fill="#ccc">🔗 Load Balancing</text>

  <!-- Arrows gateway → services -->
  <line x1="442" y1="175" x2="530" y2="125" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <line x1="442" y1="190" x2="530" y2="185" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <line x1="442" y1="205" x2="530" y2="245" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <line x1="442" y1="220" x2="530" y2="305" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrOrange)"/>

  <!-- Services (right column) -->
  <text x="640" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">Microservices</text>

  <rect x="532" y="100" width="140" height="45" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="602" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">User Service</text>
  <text x="602" y="136" text-anchor="middle" font-size="9" fill="#555">:8081</text>

  <rect x="532" y="163" width="140" height="45" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="602" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Order Service</text>
  <text x="602" y="199" text-anchor="middle" font-size="9" fill="#555">:8082</text>

  <rect x="532" y="226" width="140" height="45" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="602" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Payment Service</text>
  <text x="602" y="262" text-anchor="middle" font-size="9" fill="#555">:8083</text>

  <rect x="532" y="289" width="140" height="45" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="602" y="309" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">Catalog Service</text>
  <text x="602" y="325" text-anchor="middle" font-size="9" fill="#555">:8084</text>

  <!-- Routing labels on arrows -->
  <text x="485" y="140" font-size="8" fill="#e67e22">/api/users</text>
  <text x="485" y="183" font-size="8" fill="#e67e22">/api/orders</text>
  <text x="480" y="240" font-size="8" fill="#e67e22">/api/payments</text>
  <text x="480" y="295" font-size="8" fill="#e67e22">/api/catalog</text>

  <!-- Single entry point label -->
  <rect x="240" y="88" width="200" height="28" rx="6" fill="#27ae60"/>
  <text x="340" y="106" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Ein einziger Einstiegspunkt</text>

  <!-- Bottom note -->
  <rect x="20" y="355" width="780" height="34" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="410" y="370" text-anchor="middle" font-size="10" fill="#7d6608">Clients kennen nur eine URL: api.example.com — welcher Service dahinter steckt, ist dem Client egal.</text>
  <text x="410" y="383" text-anchor="middle" font-size="10" fill="#7d6608">Services können intern umgezogen, umbenannt oder skaliert werden, ohne dass sich Clients ändern müssen.</text>

  <defs>
    <marker id="arrGray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#aaa"/>
    </marker>
    <marker id="arrOrange" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>
