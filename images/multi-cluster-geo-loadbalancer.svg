<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <rect width="900" height="520" fill="#f4f6f9" rx="10"/>
  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1a1a2e">Multi-Cluster mit Geo-LoadBalancer</text>

  <!-- Geo-LoadBalancer box at top -->
  <rect x="300" y="50" width="300" height="70" rx="10" fill="#1a1a2e" stroke="#e67e22" stroke-width="2.5"/>
  <text x="450" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">Geo-LoadBalancer</text>
  <text x="450" y="96" text-anchor="middle" font-size="10" fill="#ccc">AWS Route53 / Cloudflare / GCP GCLB</text>
  <text x="450" y="112" text-anchor="middle" font-size="10" fill="#aaa">DNS-Routing nach Standort des Nutzers</text>

  <!-- Arrow down to three clusters -->
  <line x1="450" y1="120" x2="450" y2="160" stroke="#e67e22" stroke-width="2" marker-end="url(#arrOrange)"/>
  <line x1="450" y1="148" x2="160" y2="185" stroke="#e67e22" stroke-width="2" marker-end="url(#arrOrange)"/>
  <line x1="450" y1="148" x2="450" y2="185" stroke="#e67e22" stroke-width="2" marker-end="url(#arrOrange)"/>
  <line x1="450" y1="148" x2="740" y2="185" stroke="#e67e22" stroke-width="2" marker-end="url(#arrOrange)"/>

  <!-- Routing labels -->
  <text x="230" y="170" text-anchor="middle" font-size="9" fill="#e67e22">EU-Nutzer</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="#e67e22">US-Nutzer</text>
  <text x="660" y="170" text-anchor="middle" font-size="9" fill="#e67e22">APAC-Nutzer</text>

  <!-- Cluster EU -->
  <rect x="30" y="195" width="240" height="190" rx="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
  <rect x="30" y="195" width="240" height="34" rx="10" fill="#2980b9"/>
  <rect x="30" y="215" width="240" height="14" fill="#2980b9"/>
  <text x="150" y="217" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Cluster EU — Frankfurt</text>
  <text x="150" y="250" text-anchor="middle" font-size="10" fill="#1a5276">Pods (EU-Daten, DSGVO-konform)</text>
  <rect x="55" y="260" width="190" height="34" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1"/>
  <text x="150" y="281" text-anchor="middle" font-size="10" fill="#333">API-Service / Frontend</text>
  <rect x="55" y="302" width="190" height="34" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1"/>
  <text x="150" y="323" text-anchor="middle" font-size="10" fill="#333">Datenbank (EU-Region)</text>
  <rect x="55" y="344" width="190" height="28" rx="6" fill="#eaf4fb" stroke="#aed6f1" stroke-width="1"/>
  <text x="150" y="362" text-anchor="middle" font-size="9" fill="#555">Latenz Nutzer → Cluster: &lt; 10 ms</text>

  <!-- Cluster US -->
  <rect x="330" y="195" width="240" height="190" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <rect x="330" y="195" width="240" height="34" rx="10" fill="#27ae60"/>
  <rect x="330" y="215" width="240" height="14" fill="#27ae60"/>
  <text x="450" y="217" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Cluster US — Virginia</text>
  <text x="450" y="250" text-anchor="middle" font-size="10" fill="#1e8449">Pods (US-Daten, CCPA-konform)</text>
  <rect x="355" y="260" width="190" height="34" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="450" y="281" text-anchor="middle" font-size="10" fill="#333">API-Service / Frontend</text>
  <rect x="355" y="302" width="190" height="34" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="450" y="323" text-anchor="middle" font-size="10" fill="#333">Datenbank (US-Region)</text>
  <rect x="355" y="344" width="190" height="28" rx="6" fill="#eafaf1" stroke="#a9dfbf" stroke-width="1"/>
  <text x="450" y="362" text-anchor="middle" font-size="9" fill="#555">Latenz Nutzer → Cluster: &lt; 10 ms</text>

  <!-- Cluster APAC -->
  <rect x="630" y="195" width="240" height="190" rx="10" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
  <rect x="630" y="195" width="240" height="34" rx="10" fill="#e67e22"/>
  <rect x="630" y="215" width="240" height="14" fill="#e67e22"/>
  <text x="750" y="217" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Cluster APAC — Singapur</text>
  <text x="750" y="250" text-anchor="middle" font-size="10" fill="#784212">Pods (APAC-Daten, lokal)</text>
  <rect x="655" y="260" width="190" height="34" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1"/>
  <text x="750" y="281" text-anchor="middle" font-size="10" fill="#333">API-Service / Frontend</text>
  <rect x="655" y="302" width="190" height="34" rx="6" fill="#fff" stroke="#e67e22" stroke-width="1"/>
  <text x="750" y="323" text-anchor="middle" font-size="10" fill="#333">Datenbank (APAC-Region)</text>
  <rect x="655" y="344" width="190" height="28" rx="6" fill="#fef9e7" stroke="#f9e79f" stroke-width="1"/>
  <text x="750" y="362" text-anchor="middle" font-size="9" fill="#555">Latenz Nutzer → Cluster: &lt; 10 ms</text>

  <!-- Inter-cluster connection line -->
  <line x1="270" y1="385" x2="330" y2="385" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="570" y1="385" x2="630" y2="385" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Inter-cluster label -->
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#666">Cluster-Verbindung: VPN / Service Mesh (nur fuer clusteruebergreifende Kommunikation)</text>

  <!-- Failover note -->
  <rect x="30" y="430" width="840" height="70" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="450" y="452" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">Geo-LoadBalancer-Failover</text>
  <text x="450" y="470" text-anchor="middle" font-size="10" fill="#7d6608">Faellt ein Cluster aus, erkennt der Geo-LoadBalancer dies per Healthcheck und leitet den Traffic</text>
  <text x="450" y="487" text-anchor="middle" font-size="10" fill="#7d6608">automatisch zur naechsten verfuegbaren Region um — ohne manuellen Eingriff.</text>

  <defs>
    <marker id="arrOrange" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>
