<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="sans-serif">
  <rect width="960" height="540" fill="#0f172a" rx="12"/>
  <text x="480" y="36" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">Authorization Code Flow – User Login</text>

  <!-- Spalten-Header -->
  <rect x="20"  y="55" width="140" height="50" rx="8" fill="#1e3a5f"/>
  <text x="90"  y="77" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">Browser</text>
  <text x="90"  y="95" text-anchor="middle" fill="#bfdbfe" font-size="11">/ Web-App</text>

  <rect x="300" y="55" width="160" height="50" rx="8" fill="#14532d"/>
  <text x="380" y="77" text-anchor="middle" fill="#86efac" font-size="13" font-weight="bold">Keycloak</text>
  <text x="380" y="95" text-anchor="middle" fill="#a3e6bb" font-size="11">Auth Server</text>

  <rect x="640" y="55" width="160" height="50" rx="8" fill="#4a1942"/>
  <text x="720" y="77" text-anchor="middle" fill="#f0abfc" font-size="13" font-weight="bold">Backend App</text>
  <text x="720" y="95" text-anchor="middle" fill="#e9d5ff" font-size="11">OAuth2 Client</text>

  <!-- Vertikale Lebenslinien -->
  <line x1="90"  y1="105" x2="90"  y2="520" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="105" x2="380" y2="520" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="720" y1="105" x2="720" y2="520" stroke="#6b21a8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── Schritt 1 ─────────────────────────────────────────── -->
  <text x="8" y="148" fill="#64748b" font-size="11" font-weight="bold">1</text>
  <line x1="90" y1="142" x2="370" y2="142" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="366,138 376,142 366,146" fill="#60a5fa"/>
  <text x="228" y="136" text-anchor="middle" fill="#93c5fd" font-size="11">Redirect zur Keycloak Login-Page</text>
  <text x="228" y="157" text-anchor="middle" fill="#475569" font-size="10">response_type=code  client_id=myapp</text>
  <text x="228" y="169" text-anchor="middle" fill="#475569" font-size="10">redirect_uri=https://backend.com/callback</text>

  <!-- ── Schritt 2 ─────────────────────────────────────────── -->
  <text x="8" y="205" fill="#64748b" font-size="11" font-weight="bold">2</text>
  <rect x="300" y="185" width="160" height="36" rx="5" fill="#1a3a28"/>
  <text x="380" y="200" text-anchor="middle" fill="#86efac" font-size="10">User gibt user/password ein</text>
  <text x="380" y="215" text-anchor="middle" fill="#4ade80" font-size="10">Keycloak authentifiziert</text>

  <!-- ── Schritt 3 ─────────────────────────────────────────── -->
  <text x="8" y="255" fill="#64748b" font-size="11" font-weight="bold">3</text>
  <line x1="370" y1="244" x2="100" y2="244" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="104,240 94,244 104,248" fill="#4ade80"/>
  <!-- Redirect-Box -->
  <rect x="100" y="230" width="256" height="28" rx="4" fill="#0f2818"/>
  <text x="228" y="242" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">HTTP 302 Redirect →</text>
  <text x="228" y="254" text-anchor="middle" fill="#86efac" font-size="10">https://backend.com/callback?code=abc123</text>
  <!-- Hinweis Code -->
  <rect x="100" y="263" width="256" height="18" rx="3" fill="#132f1e"/>
  <text x="228" y="275" text-anchor="middle" fill="#6b7280" font-size="9">code ist kurzlebig (~10 Sek) und einmalig verwendbar</text>

  <!-- ── Schritt 4 ─────────────────────────────────────────── -->
  <text x="8" y="318" fill="#64748b" font-size="11" font-weight="bold">4</text>
  <line x1="90" y1="310" x2="710" y2="310" stroke="#60a5fa" stroke-width="1.5"/>
  <polygon points="706,306 716,310 706,314" fill="#60a5fa"/>
  <!-- Erklaerung -->
  <rect x="110" y="295" width="590" height="30" rx="4" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <text x="405" y="308" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">Browser folgt dem Redirect automatisch → GET /callback?code=abc123</text>
  <text x="405" y="320" text-anchor="middle" fill="#475569" font-size="9">Der Browser "schickt" den Code nicht bewusst – er folgt nur der Weiterleitung von Keycloak</text>

  <!-- ── Trennlinie: Server-to-Server Zone ─────────────────── -->
  <rect x="350" y="342" width="590" height="22" rx="5" fill="#1c1917" stroke="#78350f" stroke-width="1.5"/>
  <text x="645" y="357" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Server-to-Server — Browser ist NICHT beteiligt</text>

  <!-- ── Schritt 5 ─────────────────────────────────────────── -->
  <text x="8" y="400" fill="#64748b" font-size="11" font-weight="bold">5</text>
  <!-- Pfeil Backend -> Keycloak (direkt, kein Browser) -->
  <line x1="720" y1="385" x2="390" y2="385" stroke="#f0abfc" stroke-width="2"/>
  <polygon points="394,381 384,385 394,389" fill="#f0abfc"/>
  <rect x="408" y="371" width="296" height="28" rx="4" fill="#2d1040"/>
  <text x="556" y="383" text-anchor="middle" fill="#e879f9" font-size="10" font-weight="bold">POST /token   grant_type=authorization_code</text>
  <text x="556" y="394" text-anchor="middle" fill="#c084fc" font-size="10">code=abc123  client_id=myapp  client_secret=***</text>

  <!-- ── Schritt 6 ─────────────────────────────────────────── -->
  <text x="8" y="444" fill="#64748b" font-size="11" font-weight="bold">6</text>
  <line x1="390" y1="430" x2="710" y2="430" stroke="#4ade80" stroke-width="2"/>
  <polygon points="706,426 716,430 706,434" fill="#4ade80"/>
  <rect x="406" y="416" width="296" height="28" rx="4" fill="#0f172a" stroke="#166534" stroke-width="1"/>
  <text x="554" y="428" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">{ access_token, refresh_token, id_token }</text>
  <text x="554" y="440" text-anchor="middle" fill="#86efac" font-size="9">access_token: ~5 Min · refresh_token: ~30 Min</text>

  <!-- ── Schritt 7 ─────────────────────────────────────────── -->
  <text x="8" y="482" fill="#64748b" font-size="11" font-weight="bold">7</text>
  <rect x="640" y="462" width="160" height="32" rx="5" fill="#3b1262"/>
  <text x="720" y="477" text-anchor="middle" fill="#e9d5ff" font-size="10">Backend speichert access_token</text>
  <text x="720" y="490" text-anchor="middle" fill="#c4b5fd" font-size="10">in Session / Cookie</text>

  <!-- Hinweis: client_secret bleibt auf Server -->
  <rect x="20" y="508" width="920" height="22" rx="4" fill="#1e293b"/>
  <text x="480" y="523" text-anchor="middle" fill="#64748b" font-size="10">client_secret verlasst NIEMALS den Server · Browser sieht nur den kurzlebigen code, nie den access_token direkt</text>
</svg>
