<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <g id="env">
      <rect x="-22" y="-15" width="44" height="30" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <path d="M-22,-13 L0,4 L22,-13" fill="none" stroke="#d97706" stroke-width="2"/>
    </g>
  </defs>

  <rect width="960" height="540" fill="#ffffff"/>

  <!-- ================= ROW A : ROUTING ================= -->
  <text x="40" y="52" font-size="19" font-weight="700" fill="#1e293b">1 · Routing — wohin geht die Nachricht?</text>

  <!-- Quelle -->
  <rect x="40" y="120" width="135" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="107" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Quelle</text>
  <text x="107" y="164" text-anchor="middle" font-size="11" fill="#1e3a8a">System A</text>

  <!-- envelope on channel -->
  <use href="#env" x="245" y="150"/>
  <text x="245" y="190" text-anchor="middle" font-size="10" fill="#64748b">Message</text>
  <line x1="175" y1="150" x2="223" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="267" y1="150" x2="320" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="248" y="118" text-anchor="middle" font-size="10" fill="#94a3b8">Channel</text>

  <!-- Router diamond -->
  <polygon points="390,110 440,150 390,190 340,150" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="390" y="147" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Content-</text>
  <text x="390" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Based Router</text>

  <!-- branch up -->
  <path d="M440,140 C520,120 540,110 585,110" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="512" y="103" text-anchor="middle" font-size="10" fill="#475569">Betrag &lt; 1000 €</text>
  <rect x="595" y="86" width="165" height="48" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="677" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Ziel: Inland</text>

  <!-- branch down -->
  <path d="M440,160 C520,180 540,190 585,190" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="512" y="210" text-anchor="middle" font-size="10" fill="#475569">Betrag ≥ 1000 €</text>
  <rect x="595" y="166" width="165" height="48" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="677" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Ziel: Ausland</text>

  <!-- divider -->
  <line x1="40" y1="270" x2="920" y2="270" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ================= ROW B : SPLIT / TRANSFORM / AGGREGATE ================= -->
  <text x="40" y="320" font-size="19" font-weight="700" fill="#1e293b">2 · Zerlegen, Umwandeln, Zusammenführen</text>

  <!-- Big message -->
  <rect x="40" y="375" width="130" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="105" y="404" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Bestellung</text>
  <text x="105" y="421" text-anchor="middle" font-size="11" fill="#92400e">(3 Positionen)</text>

  <line x1="170" y1="410" x2="222" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Splitter -->
  <rect x="225" y="382" width="105" height="56" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="277" y="406" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Splitter</text>
  <text x="277" y="422" text-anchor="middle" font-size="10" fill="#15803d">1 → viele</text>

  <!-- 3 parts -->
  <line x1="330" y1="410" x2="378" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <use href="#env" x="430" y="372"/>
  <use href="#env" x="430" y="410"/>
  <use href="#env" x="430" y="448"/>
  <text x="430" y="490" text-anchor="middle" font-size="10" fill="#64748b">3 Einzel-Nachrichten</text>

  <line x1="482" y1="410" x2="528" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Translator -->
  <rect x="531" y="382" width="115" height="56" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="588" y="406" text-anchor="middle" font-size="12" font-weight="700" fill="#be185d">Translator</text>
  <text x="588" y="422" text-anchor="middle" font-size="10" fill="#be185d">XML → JSON</text>

  <line x1="646" y1="410" x2="692" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Aggregator -->
  <rect x="695" y="382" width="110" height="56" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="750" y="406" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Aggregator</text>
  <text x="750" y="422" text-anchor="middle" font-size="10" fill="#15803d">viele → 1</text>

  <line x1="805" y1="410" x2="851" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Result -->
  <rect x="854" y="375" width="92" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="900" y="404" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Sammel-</text>
  <text x="900" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">nachricht</text>

  <!-- legend -->
  <text x="40" y="525" font-size="11" fill="#94a3b8">Gelb = Message · Blau = System · Lila = Router · Grün = Split/Aggregate · Pink = Transformation</text>
</svg>
