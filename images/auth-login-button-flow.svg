<svg viewBox="0 0 740 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Actors -->
  <rect x="10"  y="20" width="100" height="38" rx="6" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <text x="60"  y="44" text-anchor="middle" fill="white" font-weight="bold">Browser</text>

  <rect x="230" y="20" width="120" height="38" rx="6" fill="#E67E22" stroke="#9A5A0A" stroke-width="2"/>
  <text x="290" y="44" text-anchor="middle" fill="white" font-weight="bold">Deine Web-App</text>

  <rect x="480" y="20" width="110" height="38" rx="6" fill="#8E44AD" stroke="#5B2B72" stroke-width="2"/>
  <text x="535" y="44" text-anchor="middle" fill="white" font-weight="bold">Keycloak</text>

  <rect x="625" y="20" width="105" height="38" rx="6" fill="#27AE60" stroke="#1A6B3A" stroke-width="2"/>
  <text x="677" y="44" text-anchor="middle" fill="white" font-weight="bold">Dein Backend</text>

  <!-- Lifelines -->
  <line x1="60"  y1="58" x2="60"  y2="370" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="290" y1="58" x2="290" y2="370" stroke="#E67E22" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="535" y1="58" x2="535" y2="370" stroke="#8E44AD" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="677" y1="58" x2="677" y2="370" stroke="#27AE60" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step 1 -->
  <line x1="60" y1="85" x2="283" y2="85" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="172" y="79" text-anchor="middle" fill="#555">① Klick auf Login-Button</text>

  <!-- Step 2 -->
  <line x1="290" y1="105" x2="67" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="172" y="100" text-anchor="middle" fill="#E67E22" font-size="11">② Redirect zu Keycloak</text>
  <text x="172" y="115" text-anchor="middle" fill="#888" font-size="10">302 Location: keycloak.../auth?code_challenge=...</text>

  <!-- Step 3 -->
  <line x1="60" y1="135" x2="528" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="295" y="129" text-anchor="middle" fill="#555">③ Browser ruft Keycloak Login-Seite auf</text>

  <!-- Step 4: Keycloak shows form -->
  <line x1="535" y1="155" x2="67"  y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="295" y="150" text-anchor="middle" fill="#8E44AD" font-size="11">④ Keycloak zeigt Login-Formular</text>
  <text x="295" y="165" text-anchor="middle" fill="#888" font-size="10">(Keycloak-Seite, nicht deine App)</text>

  <!-- Step 5: User enters credentials -->
  <rect x="10" y="172" width="100" height="22" rx="4" fill="#e8f4fd" stroke="#4A90D9"/>
  <text x="60" y="187" text-anchor="middle" fill="#2C5F8A" font-size="10">User tippt Passwort</text>
  <line x1="60" y1="194" x2="528" y2="194" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="295" y="209" text-anchor="middle" fill="#555">⑤ POST credentials an Keycloak</text>

  <!-- Step 6: Redirect back with code -->
  <line x1="535" y1="220" x2="67" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="295" y="215" text-anchor="middle" fill="#8E44AD" font-size="11">⑥ Redirect zurück mit Authorization Code</text>
  <text x="295" y="230" text-anchor="middle" fill="#888" font-size="10">302 Location: deine-app.de/callback?code=xyz</text>

  <!-- Step 7: App exchanges code -->
  <line x1="60" y1="248" x2="283" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="172" y="243" text-anchor="middle" fill="#555">⑦ /callback?code=xyz</text>

  <line x1="290" y1="263" x2="528" y2="263" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="410" y="258" text-anchor="middle" fill="#E67E22" font-size="11">⑧ POST /token (code + code_verifier)</text>

  <line x1="535" y1="278" x2="297" y2="278" stroke="#8E44AD" stroke-width="2" marker-end="url(#a)"/>
  <text x="410" y="273" text-anchor="middle" fill="#8E44AD" font-size="11" font-weight="bold">⑨ Access Token (JWT) + Refresh Token</text>

  <!-- Step 10: API call -->
  <line x1="60" y1="300" x2="283" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="172" y="295" text-anchor="middle" fill="#555">⑩ App ist eingeloggt</text>

  <line x1="60" y1="320" x2="670" y2="320" stroke="#27ae60" stroke-width="2" marker-end="url(#a)"/>
  <text x="370" y="315" text-anchor="middle" fill="#27ae60" font-weight="bold">⑪ API-Call: Authorization: Bearer JWT</text>

  <line x1="677" y1="335" x2="67" y2="335" stroke="#27ae60" stroke-width="2" marker-end="url(#a)"/>
  <text x="370" y="350" text-anchor="middle" fill="#27ae60">⑫ Response (JWT lokal geprüft – kein Keycloak-Call)</text>
</svg>
